name: Build

on: [push, pull_request, workflow_dispatch]

permissions: {}

env:
  FORCE_COLOR: 1

jobs:
  tox-jobs:
    strategy:
      fail-fast: false
      matrix:
        tox-job: [doc, pep8]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.x
      - run: pip install tox
      - run: tox -e ${{ matrix.tox-job }}
  build:
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} - ${{ matrix.python }} ${{ matrix.build }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest, ubuntu-24.04-arm]
        python: ['3.12']
        build: ['']
        include:
          - os: ubuntu-latest
            python: 'pypy3.10'
          - os: ubuntu-latest
            python: 'pypy3.9'
          - os: ubuntu-latest
            python: '3.9'
          - os: ubuntu-latest
            python: '3.10'
          - os: ubuntu-latest
            python: '3.11'
          - os: ubuntu-latest
            python: '3.12'
          - os: ubuntu-latest
            python: '3.13-dev'
            build: 'free-threading'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        if: ${{ matrix.build != 'free-threading' }}
        with:
          python-version: ${{ matrix.python }}
      - name: Set up Python ${{ matrix.python }} using deadsnakes
        uses: deadsnakes/action@e640ac8743173a67cca4d7d77cd837e514bf98e8 # v3.2.0
        if: ${{ matrix.build == 'free-threading' }}
        with:
          python-version: ${{ matrix.python }}
          nogil: true
      - name: Display Python version
        run: |
          python -VV
          python -c 'import sysconfig; print("Free threading?", "Yes" if sysconfig.get_config_var("Py_GIL_DISABLED") else "No")'
      - name: Install Tox and any other packages
        run: pip install tox
      - name: Run Tox
        # Run tox using the version of Python in `PATH`
        run: tox -e py
